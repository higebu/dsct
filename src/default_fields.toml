# Default field configuration for dsct.
#
# Controls which fields are shown in non-verbose (default) mode.
# When --verbose is specified, all fields are shown regardless of this config.
# Protocols not listed here show all fields by default.
#
# Each protocol section uses:
#   fields = [...]   Include list: only fields matching these patterns are shown.
#
# Filtering is applied recursively. Use dot notation to target nested
# sub-fields inside Array/Object containers:
#   "answers"       Include the top-level container; when a container
#                   is included but has NO dotted sub-field patterns,
#                   all of its sub-fields are shown (e.g., SRv6
#                   "segments_structure").
#   "answers.name"  Include the "name" sub-field inside "answers"
#   "answers.*"     Explicitly include all sub-fields inside "answers"
#
# Patterns (applied to the part after the last dot, or the whole name):
#   "name"      Exact match
#   "prefix_*"  Prefix match (e.g., "option_*" matches "option_overload")
#   "*_suffix"  Suffix match (e.g., "*_port" matches "src_port")

[Ethernet]
fields = [
  "dst",
  "src",
  "vlan_id",
  "ethertype",
  "ethertype_name",
  "length",
  "llc_dsap",
  "llc_ssap",
  "llc_control",
]

