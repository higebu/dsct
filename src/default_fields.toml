[DNS]
fields = [
  # Top-level header fields
  "id",
  "qr",
  "opcode",
  "rcode",
  # Record groups
  "questions",
  "answers",
  # Sub-fields inside question records
  "questions.name",
  "questions.type",
  "questions.class",
  # Sub-fields inside answer records (rdlength omitted)
  "answers.name",
  "answers.type",
  "answers.class",
  "answers.ttl",
  "answers.rdata",
  "answers.rdata_*",
  # TCP reassembly status (present on intermediate segments)
  "reassembly_in_progress",
  "segment_count",
]

